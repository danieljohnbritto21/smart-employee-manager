{% extends "base.html" %}

{% block title %}Edit Employee | Employee Management System{% endblock %}

{% block content %}
<section class="page-head">
    <div>
        <p class="section-label">Employees</p>
        <h2>Edit Employee</h2>
        <p class="section-copy">Update the main employee fields below.</p>
    </div>
</section>

<section class="form-card">
    <form method="POST" class="stack-form">
        <div class="field-grid field-grid-2">
            <div class="field">
                <label for="emp_id">Employee ID</label>
                <input type="text" id="emp_id" value="{{ employee.emp_id }}" disabled>
            </div>
            <div class="field">
                <label for="joining_date">Joining Date</label>
                <input type="text" id="joining_date" value="{{ employee.joining_date }}" disabled>
            </div>
        </div>

        <div class="field-grid field-grid-2">
            <div class="field">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" value="{{ employee.name }}" required>
            </div>
            <div class="field">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" value="{{ employee.department }}" required>
            </div>
        </div>

        <div class="field-grid field-grid-2">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ employee.email }}" required>
            </div>
            <div class="field">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" value="{{ employee.phone }}" required>
            </div>
        </div>

        <div class="field">
            <label for="salary">Salary</label>
            <input type="number" id="salary" name="salary" value="{{ employee.salary.replace(',', '') }}" required min="0" step="0.01">
        </div>

        <div class="action-row">
            <button type="submit" class="btn btn-primary">Update Employee</button>
            <a href="{{ url_for('view_employee', emp_id=employee.emp_id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
