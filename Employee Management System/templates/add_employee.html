{% extends "base.html" %}

{% block title %}Add Employee | Employee Management System{% endblock %}

{% block content %}
<section class="page-head">
    <div>
        <p class="section-label">Employees</p>
        <h2>Add Employee</h2>
        <p class="section-copy">Create a new employee record using this simple form.</p>
    </div>
</section>

<section class="form-card">
    <form method="POST" class="stack-form">
        <div class="field-grid field-grid-3">
            <div class="field">
                <label for="emp_id">Employee ID</label>
                <input type="text" id="emp_id" name="emp_id" required placeholder="E001">
            </div>
            <div class="field">
                <label for="emp_type">Employee Type</label>
                <select id="emp_type" name="emp_type" required>
                    <option value="">Select employee type</option>
                    <option value="fulltime">Full-Time</option>
                    <option value="parttime">Part-Time</option>
                    <option value="contract">Contract</option>
                </select>
            </div>
            <div class="field">
                <label for="joining_date">Joining Date</label>
                <input type="date" id="joining_date" name="joining_date" required>
            </div>
        </div>

        <div class="field-grid field-grid-3">
            <div class="field">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="field">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" required placeholder="HR">
            </div>
            <div class="field">
                <label for="salary">Salary</label>
                <input type="number" id="salary" name="salary" required min="0" step="0.01" placeholder="50000">
            </div>
        </div>

        <div class="field-grid field-grid-2">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>
            <div class="field">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" required placeholder="9876543210">
            </div>
        </div>

        <div id="fulltime-fields" class="hidden-section">
            <div class="field">
                <label for="benefits">Benefits</label>
                <textarea id="benefits" name="benefits" rows="3" placeholder="Health Insurance, Paid Leave"></textarea>
            </div>
        </div>

        <div id="parttime-fields" class="hidden-section">
            <div class="field">
                <label for="hours_per_week">Hours Per Week</label>
                <input type="number" id="hours_per_week" name="hours_per_week" min="1" max="40" step="0.5" placeholder="20">
            </div>
        </div>

        <div id="contract-fields" class="hidden-section">
            <div class="field">
                <label for="contract_end_date">Contract End Date</label>
                <input type="date" id="contract_end_date" name="contract_end_date">
            </div>
        </div>

        <div class="action-row">
            <button type="submit" class="btn btn-primary">Save Employee</button>
            <a href="{{ url_for('employees') }}" class="btn btn-secondary">Back</a>
        </div>
    </form>
</section>

<script>
function updateEmployeeFields() {
    const employeeType = document.getElementById("emp_type").value;
    const fullTimeFields = document.getElementById("fulltime-fields");
    const partTimeFields = document.getElementById("parttime-fields");
    const contractFields = document.getElementById("contract-fields");
    const hoursField = document.getElementById("hours_per_week");
    const contractEndField = document.getElementById("contract_end_date");

    fullTimeFields.classList.toggle("visible", employeeType === "fulltime");
    partTimeFields.classList.toggle("visible", employeeType === "parttime");
    contractFields.classList.toggle("visible", employeeType === "contract");

    hoursField.required = employeeType === "parttime";
    contractEndField.required = employeeType === "contract";
}

document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("emp_type").addEventListener("change", updateEmployeeFields);
    updateEmployeeFields();
});
</script>
{% endblock %}
